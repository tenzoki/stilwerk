# Stilwerk Configuration
# =====================
#
# Environment variable STILWERK_PROJECTS must point to your projects folder.
# Each project has the structure: $STILWERK_PROJECTS/<project-name>/{corpus,analysis,input}
#
# Example:
#   export STILWERK_PROJECTS=~/Documents/stilwerk-projects
#   stilwerk project-init my-analysis
#   -> Creates ~/Documents/stilwerk-projects/my-analysis/{corpus,analysis,input}

# Project folder names (inside each project)
CORPUS_DIR="corpus"        # Exemplar texts for style learning
ANALYSIS_DIR="analysis"    # Output reports and results
INPUT_DIR="input"          # Documents to examine/transform

# Default profile directory (relative to stilwerk installation)
PROFILES_DIR="./profiles"

# Default language
DEFAULT_LANGUAGE="de"

# Analysis settings
FIT_THRESHOLD=0.85         # Stop iterating when fit exceeds this
MAX_ITERATIONS=5           # Safety limit for transformation iterations

# Feature extraction defaults
MFW_COUNT=100              # Most frequent words to extract
DISTANCE_MEASURE="burrows_delta"
CLUSTERING_METHOD="ward"
